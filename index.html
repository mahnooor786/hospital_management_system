<!DOCTYPE html>
<html>
<head>
    <title>Hospital Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header"><h1>LifeCare Hospital Portal</h1></div>
    <div class="container">
        <div class="navbar">
    <h2>LifeCare <span style="color:var(--primary)">Pro</span></h2>
    <span>Administrator Panel</span>
</div>

<div class="container">
    <div class="dashboard-grid">
        <div class="card">
            <h3>Patient Registration</h3>
            <form id="pForm">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="Enter patient name" required>
                <label>Age</label>
                <input type="number" id="age" required>
                <label>Gender</label>
                <select id="gender">
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
                <button type="submit">Register Patient</button>
            </form>
        </div>

        <div class="card">
            <h3>Patient Database</h3>
            <table>
                <thead>
                    <tr>
                        <th>Reg ID</th>
                        <th>Name</th>
                        <th>Age</th>
                        <th>Gender</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="pData"></tbody>
            </table>
        </div>
    </div>
</div>
        <form id="pForm">
            <input type="text" id="name" placeholder="Patient Name" required>
            <input type="number" id="age" placeholder="Age" required>
            <select id="gender"><option value="Male">Male</option><option value="Female">Female</option></select>
            <button type="submit">Add to Database</button>
        </form>
        <table border="1">
            <thead><tr><th>ID</th><th>Name</th><th>Age</th><th>Gender</th></tr></thead>
            <tbody id="pData"></tbody>
        </table>
    </div>
    <script src="script.js"></script>
</body>
</html>
