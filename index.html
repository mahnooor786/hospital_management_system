<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LifeCare Pro | Hospital Management</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-wrapper">
        <aside class="sidebar">
            <div class="logo">LifeCare<span>+</span></div>
            <nav>
                <div class="nav-item active">Dashboard</div>
                <div class="nav-item">Patients</div>
                <div class="nav-item">Doctors</div>
                <div class="nav-item">Inventory</div>
                <div class="nav-item">Settings</div>
            </nav>
        </aside>

        <main class="main-content">
            <header>
                <h1>Hospital Overview</h1>
                <div class="user-profile">Dr. Mahnoor <div class="avatar">M</div></div>
            </header>

            <div class="stats-row">
                <div class="stat-card"><h3>12</h3><p>Today's Patients</p></div>
                <div class="stat-card"><h3>45</h3><p>Available Beds</p></div>
                <div class="stat-card"><h3>08</h3><p>OPD Queue</p></div>
            </div>

            <div class="content-grid">
                <section class="card registration">
                    <h3>New Admission</h3>
                    <form id="pForm">
                        <input type="text" id="name" placeholder="Patient Full Name" required>
                        <div class="row">
                            <input type="number" id="age" placeholder="Age" required>
                            <select id="gender">
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                            </select>
                        </div>
                        <button type="submit">Complete Registration</button>
                    </form>
                </section>

                <section class="card database">
                    <h3>Live Patient Database</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Patient Name</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="pData"></tbody>
                    </table>
                </section>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
